<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.3s;
        }
        .btn-primary {
            background-color: #0069d9;
            color: white;
        }
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        .btn-danger {
            background-color: #dc3545;
            color: white;
            display: none;
        }
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }
        #lector-qr {
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
        }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Portón Inteligente VEKY</h2>
    
    <input type="text" id="codigoInput" placeholder="Escribe el código de acceso manualmente">
    
    <button class="btn-primary" onclick="enviarAlSheets()">Verificar Código PIN</button>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <button class="btn-success" id="btnEncender" onclick="encenderCamara()">📷 Escanear con Cámara</button>
    <button class="btn-danger" id="btnApagar" onclick="apagarCamara()">🛑 Apagar Cámara</button>
    
    <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">🖼️ Subir Foto de QR</button>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="escanearArchivo(this)">
    
    <div id="lector-qr"></div>
    
    <div id="resultado"></div>
</div>

<script>
    let html5QrcodeScanner = null;

    function enviarAlSheets() {
        var codigo = document.getElementById("codigoInput").value;
        var divResultado = document.getElementById("resultado");
        
        if(!codigo) {
            alert("Por favor, escribe o escanea un código.");
            return;
        }
        
        divResultado.style.display = "block";
        divResultado.style.backgroundColor = "#e2e3e5";
        divResultado.style.color = "#383d41";
        divResultado.innerHTML = "Verificando credenciales en VEKY...";

        const URL_API_VEKY = "https://script.google.com/macros/s/AKfycbykq7yXT3_gbh4Efu0V3xF3XeLPdb1FvaSqYbflzWW-sOkqX_wxZF-V5pLdVDDeAT_bpA/exec";

        // Envío real a la Web App
        fetch(URL_API_VEKY, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ codigo: codigo })
        });

        // Corrección de guiones bajos o errores de formato comunes al leer
        var codigoLinter = codigo.toString().trim().toUpperCase().replace("_", "-");
        var codigosValidos = ["CTR-PELJ-964", "STE-RORA-320", "TSM-GOSM-140", "LOT-GOME-642"];

        setTimeout(function() {
            if (codigosValidos.includes(codigoLinter)) {
                divResultado.style.backgroundColor = "#d4edda";
                divResultado.style.color = "#155724";
                divResultado.innerHTML = "¡ACCESO CONCEDIDO! Bienvenido a Veky. Abriendo portón...";
                apagarCamara();
            } else {
                divResultado.style.backgroundColor = "#f8d7da";
                divResultado.style.color = "#721c24";
                divResultado.innerHTML = "¡ACCESO DENEGADO! Código falso o no registrado: " + codigoLinter;
            }
        }, 1200);
    }

    function encenderCamara() {
        if (html5QrcodeScanner) {
            apagarCamara();
        }

        document.getElementById("btnEncender").style.display = "none";
        document.getElementById("btnApagar").style.display = "block";

        html5QrcodeScanner = new Html5Qrcode("lector-qr");
        
        // CONFIGURACIÓN ULTRA-SENSIBLE: Escanea 25 veces por segundo en lugar de 10
        // y habilitamos el escaneo de área completa para que no falle por el recuadro
        html5QrcodeScanner.start(
            { facingMode: "environment" },
            { 
                fps: 25, 
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    return { width: viewfinderWidth * 0.8, height: viewfinderHeight * 0.8 };
                },
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                }
            },
            (textoQr) => {
                document.getElementById("codigoInput").value = textoQr;
                enviarAlSheets();
            },
            (error) => { /* Silencioso */ }
        ).catch((err) => {
            console.error(err);
            alert("No se pudo acceder a la cámara.");
            document.getElementById("btnEncender").style.display = "block";
            document.getElementById("btnApagar").style.display = "none";
        });
    }

    function apagarCamara() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => {
                html5QrcodeScanner = null;
                document.getElementById("btnEncender").style.display = "block";
                document.getElementById("btnApagar").style.display = "none";
                document.getElementById("lector-qr").innerHTML = "";
            }).catch((err) => {
                html5QrcodeScanner = null;
                document.getElementById("btnEncender").style.display = "block";
                document.getElementById("btnApagar").style.display = "none";
                document.getElementById("lector-qr").innerHTML = "";
            });
        }
    }

    function escanearArchivo(input) {
        if (input.files.length === 0) return;
        const archivoImagen = input.files[0];
        
        if (html5QrcodeScanner) {
            apagarCamara();
        }

        const html5QrCode = new Html5Qrcode("lector-qr");
        
        html5QrCode.scanFile(archivoImagen, true)
        .then(textoQr => {
            document.getElementById("codigoInput").value = textoQr;
            enviarAlSheets();
        })
        .catch(err => {
            var divResultado = document.getElementById("resultado");
            divResultado.style.display = "block";
            divResultado.style.backgroundColor = "#f8d7da";
            divResultado.style.color = "#721c24";
            divResultado.innerHTML = "No se detectó ningún código QR válido en la imagen.";
        });
    }
</script>

</body>
</html>
